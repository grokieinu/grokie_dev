<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grokie Inu Promo</title>
<link rel="icon" type="image/png" href="assets/images/grokie-inu.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:'Segoe UI',Arial,sans-serif}
.frame{width:100%;height:100%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;padding:10px 15px}
.grid-bg{position:absolute;top:-40px;left:-40px;right:-40px;bottom:-40px;background-image:linear-gradient(rgba(139,92,246,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,.07) 1px,transparent 1px);background-size:40px 40px;animation:gridMove 3s linear infinite}
@keyframes gridMove{0%{transform:translate(0,0)}100%{transform:translate(40px,40px)}}
.orb{position:absolute;border-radius:50%;filter:blur(50px)}
.orb-1{width:40%;height:40%;background:#f72585;top:-10%;left:-10%;opacity:.35;animation:orbP 4s ease-in-out infinite}
.orb-2{width:35%;height:35%;background:#8b5cf6;bottom:-10%;right:-10%;opacity:.35;animation:orbP 4s ease-in-out infinite;animation-delay:-2s}
.orb-3{width:30%;height:30%;background:#00f5ff;top:40%;left:40%;opacity:.12;animation:orbP 5s ease-in-out infinite;animation-delay:-1s}
@keyframes orbP{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.3);opacity:.5}}
.particle{position:absolute;width:3px;height:3px;border-radius:50%;animation:pFloat 3.5s ease-in-out infinite}
.p1{background:#f72585;top:18%;left:12%;animation-delay:0s}
.p2{background:#00f5ff;top:55%;left:88%;animation-delay:-.8s}
.p3{background:#8b5cf6;top:82%;left:22%;animation-delay:-1.6s}
.p4{background:#06d6a0;top:12%;left:78%;animation-delay:-.4s}
.p5{background:#f72585;top:42%;left:6%;animation-delay:-1.2s}
.p6{background:#00f5ff;top:88%;left:65%;animation-delay:-2.5s}
@keyframes pFloat{0%,100%{transform:translateY(0) scale(1);opacity:.5}50%{transform:translateY(-15px) scale(1.4);opacity:1}}
.logo-wrap{position:relative;z-index:10;opacity:0;transform:scale(0) rotate(-180deg);animation:logoIn .8s cubic-bezier(.34,1.56,.64,1) .2s forwards}
.logo-wrap img{width:70px;height:70px;border-radius:50%;border:2px solid #f72585;box-shadow:0 0 15px rgba(247,37,133,.5),0 0 30px rgba(139,92,246,.3);animation:logoGlow 2s ease-in-out infinite alternate 1s}
@keyframes logoIn{to{opacity:1;transform:scale(1) rotate(0deg)}}
@keyframes logoGlow{0%{box-shadow:0 0 20px rgba(247,37,133,.5),0 0 40px rgba(139,92,246,.3)}100%{box-shadow:0 0 35px rgba(247,37,133,.8),0 0 60px rgba(139,92,246,.5)}}
.title{position:relative;z-index:10;font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,#f72585,#8b5cf6,#00f5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:8px;text-transform:uppercase;letter-spacing:-1px;opacity:0;animation:fadeUp .7s ease-out .6s forwards}
.tagline{position:relative;z-index:10;color:#00f5ff;font-size:.72rem;font-weight:600;margin-top:4px;text-shadow:0 0 8px rgba(0,245,255,.5);opacity:0;animation:fadeUp .7s ease-out .9s forwards}
.badges{position:relative;z-index:10;display:flex;gap:6px;margin-top:10px;opacity:0;animation:fadeUp .7s ease-out 1.2s forwards;flex-wrap:wrap;justify-content:center}
.badge{background:rgba(139,92,246,.2);border:1px solid rgba(139,92,246,.5);color:#e8e8f0;padding:3px 8px;border-radius:50px;font-size:.6rem;font-weight:600;white-space:nowrap}
.launch{position:relative;z-index:10;margin-top:10px;opacity:0;animation:fadeUp .7s ease-out 1.5s forwards}
.launch-text{display:inline-block;background:linear-gradient(135deg,#f72585,#8b5cf6);color:#fff;padding:6px 14px;border-radius:50px;font-weight:800;font-size:.75rem;box-shadow:0 0 15px rgba(247,37,133,.4);animation:launchP 1.5s ease-in-out infinite alternate 2.2s}
@keyframes launchP{0%{box-shadow:0 0 15px rgba(247,37,133,.4);transform:scale(1)}100%{box-shadow:0 0 30px rgba(247,37,133,.8);transform:scale(1.04)}}
.network{position:relative;z-index:10;color:#9898b8;font-size:.7rem;margin-top:6px;opacity:0;animation:fadeUp .7s ease-out 1.8s forwards}
.network strong{color:#06d6a0}
.cta{position:relative;z-index:10;margin-top:8px;color:#00f5ff;font-size:.75rem;font-weight:700;opacity:0;animation:fadeUp .7s ease-out 2.1s forwards,blink 1.2s ease-in-out 3s infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="frame">
<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>
<div class="particle p4"></div>
<div class="particle p5"></div>
<div class="particle p6"></div>
<div class="logo-wrap"><img src="assets/images/grokie-inu.png" alt="Grokie Inu"></div>
<div class="title">GROKIE INU</div>
<div class="tagline">AI-Powered Meme Coin on Solana</div>
<div class="launch"><span class="launch-text">LIVE ON RAYDIUM</span></div>
<div class="network">Powered by <strong>Solana</strong></div>
<div class="cta">💬 Join Telegram Now!</div>
</div>
</body>
</html>
